<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Cyber Pong</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

body{

    background:#05060b;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    overflow:hidden;

    font-family:'Segoe UI',sans-serif;

    padding:14px;
}

/* الطاولة */

.game-container{

    width:95vw;
    max-width:430px;

    height:92vh;
    max-height:920px;

    position:relative;

    overflow:hidden;

    border-radius:32px;

    background:
    linear-gradient(
    180deg,
    #11182c 0%,
    #070b15 100%
    );

    border:3px solid rgba(0,210,255,.85);

    box-shadow:
    0 0 45px rgba(0,210,255,.22),
    inset 0 0 50px rgba(0,210,255,.08);

    padding-bottom:20px;
}

/* الشبكة */

.net{

    position:absolute;

    top:50%;
    left:0;

    width:100%;
    height:2px;

    transform:translateY(-50%);

    background:
    linear-gradient(
    to right,
    transparent 30%,
    rgba(0,210,255,.35) 30%
    );

    background-size:18px 10px;
}

/* المضارب */

.paddle{

    position:absolute;

    width:125px;
    height:22px;

    border-radius:60px;

    left:0;

    z-index:3;

    border:2px solid rgba(255,255,255,.7);

    backdrop-filter:blur(6px);

    transition:
    transform .05s linear,
    box-shadow .15s ease;
}

.paddle:active{

    transform:scale(1.04);
}

/* المضرب العلوي */

#cpuPaddle{

    top:25px;

    background:#ff3344;

    box-shadow:
    0 0 28px #ff3344,
    0 0 60px rgba(255,51,68,.35);
}

/* المضرب السفلي */

#playerPaddle{

    bottom:55px;

    background:#33ff66;

    box-shadow:
    0 0 28px #33ff66,
    0 0 60px rgba(51,255,102,.35);
}

/* الكرة */

#ball{

    position:absolute;

    width:22px;
    height:22px;

    border-radius:50%;

    background:#fff200;

    box-shadow:
    0 0 35px #fff200,
    0 0 15px #ffffff,
    0 0 60px rgba(255,242,0,.7);

    left:calc(50% - 11px);
    top:calc(50% - 11px);

    display:none;

    z-index:4;
}

/* السكور */

.score-display{

    position:absolute;

    font-size:7rem;

    font-weight:900;

    opacity:.10;

    z-index:1;

    pointer-events:none;
}

#pScore{

    bottom:160px;
    right:28px;

    color:#33ff66;

    text-shadow:0 0 22px #33ff66;
}

#cScore{

    top:140px;
    left:28px;

    color:#ff3344;

    text-shadow:0 0 22px #ff3344;
}

/* شاشة البداية */

.overlay{

    position:absolute;

    inset:0;

    background:rgba(5,6,11,.96);

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    z-index:10;

    padding:24px;
}

.status-msg{

    color:#9aa6c2;

    text-align:center;

    margin-bottom:28px;

    line-height:1.8;

    font-size:1rem;
}

.overlay input{

    width:120px;

    padding:14px;

    border:none;
    outline:none;

    border-radius:14px;

    background:#11172a;

    color:#fff;

    font-size:1.5rem;

    text-align:center;

    font-weight:bold;

    border:2px solid #00d2ff;

    margin-bottom:24px;
}

.btn-group{

    width:100%;

    display:flex;

    flex-direction:column;

    gap:14px;

    align-items:center;
}

.overlay button{

    width:100%;

    max-width:240px;

    padding:15px;

    border:none;

    border-radius:40px;

    color:#fff;

    font-size:1.05rem;

    font-weight:bold;

    cursor:pointer;
}

#joinBtn{

    background:
    linear-gradient(
    135deg,
    #00d2ff,
    #0066ff
    );

    box-shadow:
    0 0 24px rgba(0,210,255,.4);
}

#startBtn{

    background:
    linear-gradient(
    135deg,
    #ff3344,
    #ff6600
    );

    box-shadow:
    0 0 24px rgba(255,51,68,.4);
}

/* اهتزاز */

.shake{

    animation:shake .15s ease-in-out;
}

@keyframes shake{

    0%{
        transform:translate(0,0);
    }

    25%{
        transform:translate(-3px,3px);
    }

    50%{
        transform:translate(3px,-3px);
    }

    100%{
        transform:translate(0,0);
    }
}

</style>
</head>

<body>

<div class="game-container" id="gameBox">

    <div id="cScore" class="score-display">0</div>

    <div id="pScore" class="score-display">0</div>

    <div class="net"></div>

    <div id="cpuPaddle" class="paddle"></div>

    <div id="playerPaddle" class="paddle"></div>

    <div id="ball"></div>

    <div id="startOverlay" class="overlay">

        <div class="status-msg"
        id="statusMessage">

            جاري الاتصال بالساحة...

        </div>

        <input
        type="number"
        id="playerRoleInput"
        min="1"
        max="2"
        placeholder="1 / 2">

        <div class="btn-group">

            <button id="joinBtn"
            onclick="window.joinGame()">

                دخول الساحة 🚀

            </button>

            <button id="startBtn"
            onclick="window.requestStartGame()"
            style="display:none;">

                بدء المواجهة 🔥

            </button>

        </div>

    </div>

</div>

<script>

const gameBox =
document.getElementById('gameBox');

const playerPaddle =
document.getElementById('playerPaddle');

const cpuPaddle =
document.getElementById('cpuPaddle');

const ball =
document.getElementById('ball');

let boxRect =
gameBox.getBoundingClientRect();

let paddleWidth = 125;

let myPaddleX =
(boxRect.width / 2) - (paddleWidth / 2);

/* حركة ناعمة */

function handleMove(clientX){

    boxRect =
    gameBox.getBoundingClientRect();

    let relativeX =
    clientX - boxRect.left;

    let currentX =
    relativeX - (paddleWidth / 2);

    currentX = Math.max(
    0,
    Math.min(
    boxRect.width - paddleWidth,
    currentX
    )
    );

    myPaddleX = currentX;

    playerPaddle.style.transform =
    `translateX(${myPaddleX}px)`;
}

/* لمس */

gameBox.addEventListener(

'touchstart',

(e)=>{

    handleMove(
    e.touches[0].clientX
    );

},

{passive:true}

);

gameBox.addEventListener(

'touchmove',

(e)=>{

    handleMove(
    e.touches[0].clientX
    );

    e.preventDefault();

},

{passive:false}

);

/* ماوس */

gameBox.addEventListener(

'mousemove',

(e)=>{

    handleMove(
    e.clientX
    );

}

);

/* حركة بسيطة للكرة */

let ballX =
(boxRect.width / 2);

let ballY =
(boxRect.height / 2);

let speedX = 5;

let speedY = 6;

function animateBall(){

    ball.style.display='block';

    ballX += speedX;

    ballY += speedY;

    if(ballX <= 0 ||
    ballX >= boxRect.width - 22){

        speedX = -speedX;
    }

    if(ballY <= 0 ||
    ballY >= boxRect.height - 22){

        speedY = -speedY;
    }

    ball.style.left =
    ballX + 'px';

    ball.style.top =
    ballY + 'px';

    requestAnimationFrame(
    animateBall
    );
}

animateBall();

</script>

</body>
</html>
