<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Pong</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* حماية الشاشة الكاملة والتوافق الذكي مع سامسونج وهواوي */
        html, body {
            width: 100%;
            height: 100%;
            background: #06070d;
            overflow: hidden;
        }

        body {
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* توزيع ذكي يمنع النزول تحت الأزرار */
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(15px + env(safe-area-inset-bottom)) 10px;
            touch-action: none; 
        }

        /* طاولة مرنة تتكيف ذكياً مع أي متصفح وشاشة */
        .game-container {
            width: 100%;
            max-width: 360px;
            flex: 1; /* تأخذ كل المساحة المتاحة بأمان فوق شريط التحكم */
            margin-bottom: 10px;
            background: radial-gradient(circle, #111322 0%, #06070d 100%);
            border: 3px solid #00d2ff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
            position: relative;
            overflow: hidden;
            touch-action: none;
            transition: border-color 0.1s, box-shadow 0.1s;
        }

        /* أنيميشن فلاش الأطراف النيون عند تسجيل الجون */
        @keyframes scoreFlash {
            0% { border-color: #fffb00; box-shadow: 0 0 40px #fffb00, inset 0 0 30px #fffb00; }
            25% { border-color: #ff3344; box-shadow: 0 0 50px #ff3344, inset 0 0 40px #ff3344; }
            50% { border-color: #b026ff; box-shadow: 0 0 50px #b026ff, inset 0 0 40px #b026ff; }
            75% { border-color: #00d2ff; box-shadow: 0 0 50px #00d2ff, inset 0 0 40px #00d2ff; }
            100% { border-color: #00d2ff; box-shadow: 0 0 25px rgba(0, 210, 255, 0.2), inset 0 0 0px transparent; }
        }

        .score-celebration {
            animation: scoreFlash 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* شريط التحكم السفلي المضيء والمشع */
        .control-slider-container {
            width: 100%;
            max-width: 360px;
            background: #111322;
            border: 2px solid #00d2ff;
            border-radius: 15px;
            height: 55px;
            min-height: 55px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .control-track {
            width: 88%;
            height: 6px;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 3px;
            position: relative;
        }

        .control-knob {
            width: 50px;
            height: 28px;
            background: #00d2ff;
            border-radius: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 25px #00d2ff, 0 0 5px #fff;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .net {
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent 30%, rgba(0, 210, 255, 0.15) 30%);
            background-size: 15px 10px;
            transform: translateY(-50%);
        }

        .paddle {
            position: absolute;
            width: 85px;
            height: 16px; 
            border-radius: 30px;
            left: calc(50% - 42.5px);
            transition: none; 
        }

        #cpuPaddle {
            top: 25px;
            background: #33ff66;
            box-shadow: 0 0 20px #33ff66;
        }

        #playerPaddle {
            bottom: 25px; 
            background: #ff3344;
            box-shadow: 0 0 20px #ff3344;
        }

        /* تكبير الكرة وزيادة توهجها النيون */
        #ball {
            position: absolute;
            width: 20px; /* تكبير الكرة */
            height: 20px;
            background: #fffb00;
            border-radius: 50%;
            box-shadow: 0 0 25px #fffb00, 0 0 10px #fff;
            left: calc(50% - 10px);
            top: calc(50% - 10px);
            will-change: top, left;
            display: none; 
        }

        .score-display {
            position: absolute;
            font-size: 5rem;
            font-weight: 900;
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }

        #pScore {
            bottom: 70px; right: 25px;
            color: #ff3344; text-shadow: 0 0 20px #ff3344;
        }

        #cScore {
            top: 70px; left: 25px;
            color: #33ff66; text-shadow: 0 0 20px #33ff66;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 7, 13, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 25px;
        }

        .overlay h2 {
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin-bottom: 25px;
            font-size: 1.4rem;
        }

        .overlay input {
            padding: 12px;
            font-size: 1.5rem;
            width: 110px;
            text-align: center;
            border: 2px solid #00d2ff;
            background: #111322;
            color: #fff;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .status-msg {
            font-size: 1rem;
            color: #8892b0;
            margin-bottom: 25px;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .overlay button {
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            width: 100%;
            max-width: 220px;
        }

        #startBtn {
            background: linear-gradient(135deg, #ff3344, #ff6600);
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.4);
        }

        .shake {
            animation: hitShake 0.15s ease-in-out;
        }

        @keyframes hitShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 3px); }
            50% { transform: translate(3px, -3px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameBox">
        <div id="cScore" class="score-display">0</div>
        <div id="pScore" class="score-display">0</div>
        
        <div class="net"></div>
        <div id="cpuPaddle" class="paddle"></div>
        <div id="playerPaddle" class="paddle"></div>
        <div id="ball"></div>

        <div id="startOverlay" class="overlay">
            <h2>CYBER PONG</h2>
            <div class="status-msg" id="statusMessage">جاري المزامنة...</div>
            
            <input type="number" id="playerRoleInput" pattern="[1-2]*" inputmode="numeric" min="1" max="2" placeholder="الدور">
            
            <div class="btn-group">
                <button id="joinBtn" onclick="window.joinGame()">دخول الساحة 🚀</button>
                <button id="startBtn" onclick="window.requestStartGame()" style="display: none;">انطلاق المواجهة 🔥</button>
            </div>
        </div>
    </div>

    <div class="control-slider-container" id="sliderContainer">
        <div class="control-track">
            <div class="control-knob" id="sliderKnob"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5-fI6x_c5O5eyx5aqLpDRa15xSKDzrr4",
            authDomain: "moor-ff93d.firebaseapp.com",
            projectId: "moor-ff93d",
            storageBucket: "moor-ff93d.firebasestorage.app",
            messagingSenderId: "482827206696",
            appId: "1:482827206696:web:20651d267da19c0234f51d",
            measurementId: "G-781HE6SX64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, "gameRoom");

        window.fbUpdate = update;
        window.fbSet = set;
        window.gameRef = gameRef;

        let lastPScore = 0;
        let lastCScore = 0;

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            window.onlineData = data; 

            const statusMessage = document.getElementById("statusMessage");
            const roleInput = document.getElementById("playerRoleInput");
            const joinBtn = document.getElementById("joinBtn");
            const startBtn = document.getElementById("startBtn");

            if (!window.hasJoined) {
                if (!data || (!data.p1_online && !data.p2_online)) {
                    statusMessage.innerText = "أدخل رقم 1 لتلعب باللون الأحمر من الأسفل.";
                } else if (data.p1_online && !data.p2_online) {
                    statusMessage.innerHTML = "الخصم جاهز بالأحمر!<br>أدخل رقم 2 لتلعب بالأخضر من الأسفل.";
                } else if (data.p1_online && data.p2_online) {
                    statusMessage.innerText = "الساحة ممتلئة حالياً باللاعبين.";
                }
            } else {
                if (data && data.p1_online && data.p2_online) {
                    statusMessage.innerHTML = "⚡ اكتمل الاتصال اللحظي! ⚡<br>اضغط زر الانطلاق لبدء اللعب.";
                    roleInput.style.display = "none";
                    joinBtn.style.display = "none";
                    startBtn.style.display = "block";
                }

                if (data) {
                    // رصد تسجيل الأهداف لتشغيل فلاش الأطراف المبهر فوراً عند الطرفين
                    if (data.pScore !== undefined && data.pScore !== lastPScore) {
                        document.getElementById('pScore').innerText = data.pScore;
                        lastPScore = data.pScore;
                        window.triggerScoreCelebration();
                    }
                    if (data.cScore !== undefined && data.cScore !== lastCScore) {
                        document.getElementById('cScore').innerText = data.cScore;
                        lastCScore = data.cScore;
                        window.triggerScoreCelebration();
                    }

                    if (window.myRole === 1) {
                        if (data.cpuX !== undefined) window.updateTopPaddleX(data.cpuX);
                        if (data.ballX !== undefined && data.ballY !== undefined) window.updateBallPosition(data.ballX, data.ballY);
                    } else if (window.myRole === 2) {
                        if (data.playerX !== undefined) window.updateTopPaddleX(data.playerX);
                        if (data.ballX !== undefined && data.ballY !== undefined) {
                            let invertedX = boxRect.width - ballSize - data.ballX;
                            let invertedY = boxRect.height - ballSize - data.ballY;
                            window.updateBallPosition(invertedX, invertedY);
                        }
                    }

                    if (data.gameStarted === true && !window.gameRunning) {
                        window.triggerActualStart();
                    }
                }
            }
        });
    </script>

    <script>
        const gameBox = document.getElementById('gameBox');
        const playerPaddle = document.getElementById('playerPaddle');
        const cpuPaddle = document.getElementById('cpuPaddle');
        const ball = document.getElementById('ball');
        const pScoreDisplay = document.getElementById('pScore');
        const cScoreDisplay = document.getElementById('cScore');
        const startOverlay = document.getElementById('startOverlay');
        const sliderContainer = document.getElementById('sliderContainer');
        const sliderKnob = document.getElementById('sliderKnob');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(320, now);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'score') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(580, now);
                osc.frequency.exponentialRampToValueAtTime(1400, now + 0.35);
                gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now); osc.stop(now + 0.35);
            }
        }

        function triggerScreenShake() {
            gameBox.classList.add('shake');
            setTimeout(() => gameBox.classList.remove('shake'), 150);
        }

        // تشغيل احتفال فلاش الأطراف النيون الرباعي عند الجون
        window.triggerScoreCelebration = function() {
            gameBox.classList.remove('score-celebration');
            void gameBox.offsetWidth; // الخدعة السحرية لإعادة تشغيل الـ CSS Animation
            gameBox.classList.add('score-celebration');
        };

        window.myRole = 0;
        window.hasJoined = false;
        window.gameRunning = false;

        let boxRect = gameBox.getBoundingClientRect();
        let paddleWidth = 85;
        let paddleHeight = 16;
        let ballSize = 20; // تكبير الكورة لـ 20px لتصبح واضحة جداً

        let myPaddleX = (boxRect.width / 2) - (paddleWidth / 2);
        let ballX = (boxRect.width / 2) - (ballSize / 2);
        let ballY = (boxRect.height / 2) - (ballSize / 2);

        let ballSpeedX = 0;
        let ballSpeedY = 0;
        const initialSpeedY = 6.5; 

        // إعادة حساب الأبعاد ذكياً عند تغيير حجم الشاشة أو تدويرها
        function resizeGame() {
            boxRect = gameBox.getBoundingClientRect();
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => { setTimeout(resizeGame, 200); });

        window.updateTopPaddleX = function(x) { 
            if (window.myRole === 2) {
                let invertedX = boxRect.width - paddleWidth - x;
                cpuPaddle.style.left = invertedX + 'px';
            } else {
                cpuPaddle.style.left = x + 'px';
            }
        };

        window.updateBallPosition = function(x, y) {
            ballX = x; ballY = y;
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        };

        window.joinGame = function() {
            const roleInput = document.getElementById("playerRoleInput").value;
            if (roleInput !== "1" && roleInput !== "2") {
                alert("اكتب 1 أو 2 فقط لتحديد دورك!");
                return;
            }
            window.myRole = parseInt(roleInput);
            window.hasJoined = true;
            resizeGame();

            // تخصيص الألوان وإشعاع الشريط التام للاعب 2 (الأخضر)
            if (window.myRole === 2) {
                playerPaddle.style.background = "#33ff66";
                playerPaddle.style.boxShadow = "0 0 20px #33ff66";
                cpuPaddle.style.background = "#ff3344";
                cpuPaddle.style.boxShadow = "0 0 20px #ff3344";
                
                sliderKnob.style.background = "#33ff66";
                sliderKnob.style.boxShadow = "0 0 25px #33ff66, 0 0 5px #fff";
                sliderContainer.style.borderColor = "#33ff66";
                sliderContainer.style.boxShadow = "0 0 20px rgba(51, 255, 102, 0.25)";
                
                pScoreDisplay.style.color = "#33ff66";
                pScoreDisplay.style.textShadow = "0 0 20px #33ff66";
                pScoreDisplay.style.bottom = "auto"; pScoreDisplay.style.top = "70px"; pScoreDisplay.style.left = "25px";
                
                cScoreDisplay.style.color = "#ff3344";
                cScoreDisplay.style.textShadow = "0 0 20px #ff3344";
                cScoreDisplay.style.top = "auto"; cScoreDisplay.style.bottom = "70px"; cScoreDisplay.style.right = "25px";
            }

            if (window.myRole === 1) {
                window.fbSet(window.gameRef, {
                    p1_online: true,
                    p2_online: false,
                    pScore: 0,
                    cScore: 0,
                    gameStarted: false,
                    playerX: myPaddleX,
                    cpuX: myPaddleX
                });
            } else if (window.myRole === 2) {
                window.fbUpdate(window.gameRef, { "p2_online": true });
            }
        };

        window.requestStartGame = function() {
            const data = window.onlineData;
            if (!data || !data.p1_online || !data.p2_online) return;
            window.fbUpdate(window.gameRef, { "gameStarted": true });
        };

        window.triggerActualStart = function() {
            playSound('hit');
            startOverlay.style.display = 'none';
            ball.style.display = 'block';
            window.gameRunning = true;
            resizeGame();

            if (window.myRole === 1) {
                resetBall(1);
            }
            requestAnimationFrame(updateGame);
        };

        // إدارة شريط السلايدر الذكي المتوافق 100% مع شاشات السامسونج اللمسية
        function handleSliderMove(clientX) {
            if (!window.gameRunning) return;
            boxRect = gameBox.getBoundingClientRect();
            const sliderRect = sliderContainer.getBoundingClientRect();
            
            let relativeX = clientX - sliderRect.left;
            let percentage = relativeX / sliderRect.width;
            percentage = Math.max(0, Math.min(1, percentage));

            sliderKnob.style.left = `calc(${percentage * 100}% - 25px)`;

            let currentX = percentage * (boxRect.width - paddleWidth);
            myPaddleX = currentX;
            playerPaddle.style.left = myPaddleX + 'px';

            let dataToSend = {};
            if (window.myRole === 1) {
                dataToSend["playerX"] = myPaddleX;
            } else if (window.myRole === 2) {
                let originalX = boxRect.width - paddleWidth - myPaddleX;
                dataToSend["cpuX"] = originalX;
            }
            window.fbUpdate(window.gameRef, dataToSend);
        }

        sliderContainer.addEventListener('touchstart', (e) => { handleSliderMove(e.touches[0].clientX); }, { passive: true });
        sliderContainer.addEventListener('touchmove', (e) => { handleSliderMove(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
        sliderContainer.addEventListener('mousedown', (e) => {
            function onMouseMove(event) { handleSliderMove(event.clientX); }
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', () => { window.removeEventListener('mousemove', onMouseMove); }, { once: true });
        });

        function resetBall(direction) {
            boxRect = gameBox.getBoundingClientRect();
            ballX = (boxRect.width / 2) - (ballSize / 2);
            ballY = (boxRect.height / 2) - (ballSize / 2);
            ballSpeedX = (Math.random() - 0.5) * 5;
            ballSpeedY = direction * initialSpeedY;
        }

        function updateGame() {
            if (!window.gameRunning) return;

            if (window.myRole === 1) {
                let data = window.onlineData;
                let currentCpuX = (data && data.cpuX !== undefined) ? data.cpuX : (boxRect.width / 2 - paddleWidth / 2);
                
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                if (ballX <= 0 || ballX >= boxRect.width - ballSize) {
                    ballSpeedX = -ballSpeedX;
                    playSound('hit');
                }

                // اصطدام مضرب الخصم العلوي (25px من الحافة آمنة)
                if (ballY <= 25 + paddleHeight && ballY >= 25) {
                    if (ballX + ballSize >= currentCpuX && ballX <= currentCpuX + paddleWidth) {
                        ballY = 25 + paddleHeight;
                        ballSpeedY = -ballSpeedY;
                        let hitPoint = (ballX + ballSize/2) - (currentCpuX + paddleWidth/2);
                        ballSpeedX = hitPoint * 0.22;
                        playSound('hit');
                        triggerScreenShake();
                    }
                }

                // اصطدام مضربك السفلي (25px من الحافة آمنة)
                if (ballY >= boxRect.height - 25 - paddleHeight - ballSize && ballY <= boxRect.height - 25) {
                    if (ballX + ballSize >= myPaddleX && ballX <= myPaddleX + paddleWidth) {
                        ballY = boxRect.height - 25 - paddleHeight - ballSize;
                        ballSpeedY = -ballSpeedY;
                        let hitPoint = (ballX + ballSize/2) - (myPaddleX + paddleWidth/2);
                        ballSpeedX = hitPoint * 0.22;
                        playSound('hit');
                        triggerScreenShake();
                    }
                }

                if (ballY < 0) {
                    let pScore = parseInt(document.getElementById('pScore').innerText) + 1;
                    window.fbUpdate(window.gameRef, { "pScore": pScore });
                    playSound('score');
                    triggerScreenShake();
                    resetBall(-1);
                } else if (ballY > boxRect.height) {
                    let cScore = parseInt(document.getElementById('cScore').innerText) + 1;
                    window.fbUpdate(window.gameRef, { "cScore": cScore });
                    playSound('score');
                    triggerScreenShake();
                    resetBall(1);
                }

                window.fbUpdate(window.gameRef, { "ballX": ballX, "ballY": ballY });
                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            }

            requestAnimationFrame(updateGame);
        }
    </script>
</body>
</html>
