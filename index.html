<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي البينج بونج أونلاين - غرفة الانتظار 📱🌐</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: radial-gradient(circle, #1a1c29 0%, #0b0c10 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            padding: 10px;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00d2ff;
            color: #00d2ff;
            text-align: center;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 8px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .player-score { color: #ff3344; text-shadow: 0 0 8px #ff3344; }
        .cpu-score { color: #33ff66; text-shadow: 0 0 8px #33ff66; }

        .game-container {
            width: 95vw;
            max-width: 420px;
            height: 70vh;
            max-height: 650px;
            background: rgba(255, 255, 255, 0.02);
            border: 4px solid #00d2ff;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.25);
            position: relative;
            overflow: hidden;
        }

        .net {
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent 50%, rgba(255,255,255,0.1) 50%);
            background-size: 20px 10px;
            transform: translateY(-50%);
        }

        .paddle {
            position: absolute;
            width: 95px;
            height: 15px;
            border-radius: 8px;
            left: calc(50% - 47.5px);
            transition: none; 
        }

        #cpuPaddle {
            top: 15px;
            background: #33ff66;
            box-shadow: 0 0 15px #33ff66;
        }

        #playerPaddle {
            bottom: 15px;
            background: #ff3344;
            box-shadow: 0 0 15px #ff3344;
        }

        #ball {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fffb00;
            border-radius: 50%;
            box-shadow: 0 0 15px #fffb00, 0 0 5px #fff;
            left: calc(50% - 8px);
            top: calc(50% - 8px);
            will-change: top, left;
            display: none; /* مخفية حتى تبدأ اللعبة فعلياً */
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 11px;
            padding: 20px;
        }

        .overlay h2 {
            color: #fffb00;
            text-shadow: 0 0 10px #fffb00;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        .overlay input {
            padding: 10px;
            font-size: 1.2rem;
            width: 80px;
            text-align: center;
            border: 2px solid #00d2ff;
            background: #1a1c29;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .status-msg {
            font-size: 1.1rem;
            color: #00d2ff;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            max-width: 300px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80%;
            align-items: center;
        }

        .overlay button {
            background: linear-gradient(45deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            width: 100%;
            max-width: 200px;
        }

        #startBtn {
            background: linear-gradient(45deg, #ff3344, #ff6600);
            box-shadow: 0 0 15px rgba(255, 51, 68, 0.5);
        }

        .role-indicator {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="role-indicator" id="roleTag">متصل كـ: زائر</div>
    <h1>تحدي البينج بونج أونلاين 🌐🔥</h1>

    <div class="scoreboard">
        <div class="player-score">لاعب 1 (تحت): <span id="pScore">0</span></div>
        <div class="cpu-score">لاعب 2 (فوق): <span id="cScore">0</span></div>
    </div>

    <div class="game-container" id="gameBox">
        <div class="net"></div>
        <div id="cpuPaddle" class="paddle"></div>
        <div id="playerPaddle" class="paddle"></div>
        <div id="ball"></div>

        <div id="startOverlay" class="overlay">
            <h2 id="promptTitle">غرفة التحكم والانتظار</h2>
            <div class="status-msg" id="statusMessage">جاري الاتصال بالسيرفر المتزامن...</div>
            
            <input type="number" id="playerRoleInput" min="1" max="2" placeholder="رقم">
            
            <div class="btn-group">
                <button id="joinBtn" onclick="joinGame()">دخول الغرفة 🚀</button>
                <button id="startBtn" onclick="requestStartGame()" style="display: none;">اضغط ابدأ اللعب 🔥</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5-fI6x_c5O5eyx5aqLpDRa15xSKDzrr4",
            authDomain: "moor-ff93d.firebaseapp.com",
            projectId: "moor-ff93d",
            storageBucket: "moor-ff93d.firebasestorage.app",
            messagingSenderId: "482827206696",
            appId: "1:482827206696:web:20651d267da19c0234f51d",
            measurementId: "G-781HE6SX64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, "gameRoom");

        window.db = db;
        window.gameRef = gameRef;
        window.update = update;
        window.onValue = onValue;

        // نظام فحص الغرفة والانتظار المتطور
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            const statusMessage = document.getElementById("statusMessage");
            const roleInput = document.getElementById("playerRoleInput");
            const joinBtn = document.getElementById("joinBtn");
            const startBtn = document.getElementById("startBtn");

            // حفظ البيانات أونلاين في متغير عام للاستخدام بـ الجافا سكريبت العادية
            window.onlineData = data;

            if (!window.hasJoined) {
                if (!data) {
                    statusMessage.innerText = "الغرفة فارغة. اكتب رقم 1 لتكون اللاعب الأول!";
                } else {
                    if (data.p1_online && !data.p2_online) {
                        statusMessage.innerHTML = "<span style='color:#ff3344;'>اللاعب الأول دخل بالفعل!</span><br>اكتب رقم الدخول 2 فوراً لتدخل معه.";
                    } else if (data.p1_online && data.p2_online) {
                        statusMessage.innerText = "الغرفة ممتلئة باللاعبين حالياً.";
                    }
                }
            } else {
                // إذا كان اللاعب داخل الغرفة بالفعل ويراقب الوضع
                if (data.p1_online && data.p2_online) {
                    statusMessage.innerHTML = "✨ أنتم الآن في اللعبة معاً! ✨<br>اضغطوا على زر ابدأ بالأسفل لإنطلاق التحدي.";
                    roleInput.style.display = "none";
                    joinBtn.style.display = "none";
                    startBtn.style.display = "block";
                } else if (data.p1_online && !data.p2_online && window.myRole === 1) {
                    statusMessage.innerText = "أنت متصل كاللاعب الأول. في انتظار دخول صديقك برقم 2...";
                }
                
                // الاستماع لإشارة بدء اللعب الحقيقية من أي طرف
                if (data.gameStarted === true && !window.gameRunning) {
                    triggerActualStart();
                }
            }
        });
    </script>

    <script>
        const gameBox = document.getElementById('gameBox');
        const playerPaddle = document.getElementById('playerPaddle');
        const cpuPaddle = document.getElementById('cpuPaddle');
        const ball = document.getElementById('ball');
        const pScoreDisplay = document.getElementById('pScore');
        const cScoreDisplay = document.getElementById('cScore');
        const startOverlay = document.getElementById('startOverlay');
        const roleTag = document.getElementById('roleTag');

        // نظام الصوت
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'playerScore') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'cpuScore') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        window.myRole = 0;
        window.hasJoined = false;
        window.gameRunning = false;

        let boxRect = gameBox.getBoundingClientRect();
        let paddleWidth = 95;
        let paddleHeight = 15;
        let ballSize = 16;

        let playerX = (boxRect.width / 2) - (paddleWidth / 2);
        let cpuX = (boxRect.width / 2) - (paddleWidth / 2);
        let ballX = (boxRect.width / 2) - (ballSize / 2);
        let ballY = (boxRect.height / 2) - (ballSize / 2);

        let ballSpeedX = 0;
        let ballSpeedY = 0;
        const initialSpeedY = 6.5;

        // الضغط على دخول الغرفة
        function joinGame() {
            const roleInput = document.getElementById("playerRoleInput").value;
            if (roleInput != "1" && roleInput != "2") {
                alert("يرجى كتابة رقم 1 أو رقم 2 فقط!");
                return;
            }
            window.myRole = parseInt(roleInput);
            window.hasJoined = true;
            roleTag.innerText = `متصل كـ: لاعب رقم ${window.myRole}`;

            let updateData = {};
            if (window.myRole === 1) updateData["p1_online"] = true;
            if (window.myRole === 2) updateData["p2_online"] = true;
            
            // تصفير النقاط القديمة عند بداية الجلسة الجديدة تماماً
            if (window.myRole === 1) {
                updateData["pScore"] = 0;
                updateData["cScore"] = 0;
                updateData["gameStarted"] = false;
            }

            window.update(window.gameRef, updateData);

            document.getElementById("playerRoleInput").style.display = "none";
            document.getElementById("joinBtn").style.display = "none";
            document.getElementById("startBtn").style.display = "block";

            // بدء استقبال التحديثات
            listenToOnlineGame();
        }

        // التحقق من زر "ابدأ اللعب"
        function requestStartGame() {
            const data = window.onlineData;
            
            // شرط الحماية: لو اللاعب التاني مش موجود واقفل اللعب
            if (!data || !data.p1_online || !data.p2_online) {
                alert("عذراً، يجب دخول اللاعب الآخر أولاً لبدء المنافسة!");
                return;
            }

            // إرسال أمر البدء للجميع أونلاين
            window.update(window.gameRef, { "gameStarted": true });
        }

        // تشغيل المحرك الفعلي للعبة
        function triggerActualStart() {
            playSound('hit');
            startOverlay.style.display = 'none';
            ball.style.display = 'block';
            window.gameRunning = true;

            if (window.myRole === 1) {
                resetBall(1);
            }
            requestAnimationFrame(updateGame);
        }

        function listenToOnlineGame() {
            window.onValue(window.gameRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.pScore !== undefined) pScoreDisplay.innerText = data.pScore;
                if (data.cScore !== undefined) cScoreDisplay.innerText = data.cScore;

                if (window.myRole === 1 && data.cpuX !== undefined) {
                    cpuX = data.cpuX;
                    cpuPaddle.style.left = cpuX + 'px';
                }
                if (window.myRole === 2) {
                    if (data.playerX !== undefined) {
                        playerX = data.playerX;
                        playerPaddle.style.left = playerX + 'px';
                    }
                    if (data.ballX !== undefined) {
                        ballX = data.ballX;
                        ball.style.left = ballX + 'px';
                    }
                    if (data.ballY !== undefined) {
                        ballY = data.ballY;
                        ball.style.top = ballY + 'px';
                    }
                }
            });
        }

        // حركة المضارب ونقلها فوراً للفيربيز
        gameBox.addEventListener('mousemove', (e) => {
            let relativeX = e.clientX - boxRect.left;
            sendPaddlePosition(relativeX - (paddleWidth / 2));
        });

        gameBox.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            let relativeX = touch.clientX - boxRect.left;
            sendPaddlePosition(relativeX - (paddleWidth / 2));
            e.preventDefault();
        }, { passive: false });

        function sendPaddlePosition(xPos) {
            let currentX = Math.max(0, Math.min(boxRect.width - paddleWidth, xPos));
            if (!window.gameRunning) return;

            let dataToSend = {};
            if (window.myRole === 1) {
                playerX = currentX;
                playerPaddle.style.left = playerX + 'px';
                dataToSend["playerX"] = playerX;
            } else if (window.myRole === 2) {
                cpuX = currentX;
                cpuPaddle.style.left = cpuX + 'px';
                dataToSend["cpuX"] = cpuX;
            }
            window.update(window.gameRef, dataToSend);
        }

        function resetBall(direction) {
            ballX = (boxRect.width / 2) - (ballSize / 2);
            ballY = (boxRect.height / 2) - (ballSize / 2);
            ballSpeedX = (Math.random() - 0.5) * 5;
            ballSpeedY = direction * initialSpeedY;
        }

        function updateGame() {
            if (!window.gameRunning) return;

            if (window.myRole === 1) {
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                if (ballX <= 0 || ballX >= boxRect.width - ballSize) {
                    ballSpeedX = -ballSpeedX;
                    playSound('hit');
                }

                if (ballY <= 15 + paddleHeight && ballY >= 15) {
                    if (ballX + ballSize >= cpuX && ballX <= cpuX + paddleWidth) {
                        ballY = 15 + paddleHeight;
                        ballSpeedY = -ballSpeedY;
                        let hitPoint = (ballX + ballSize/2) - (cpuX + paddleWidth/2);
                        ballSpeedX = hitPoint * 0.18;
                        playSound('hit');
                    }
                }

                if (ballY >= boxRect.height - 15 - paddleHeight - ballSize && ballY <= boxRect.height - 15) {
                    if (ballX + ballSize >= playerX && ballX <= playerX + paddleWidth) {
                        ballY = boxRect.height - 15 - paddleHeight - ballSize;
                        ballSpeedY = -ballSpeedY;
                        let hitPoint = (ballX + ballSize/2) - (playerX + paddleWidth/2);
                        ballSpeedX = hitPoint * 0.18;
                        playSound('hit');
                    }
                }

                if (ballY < 0) {
                    let pScore = parseInt(pScoreDisplay.innerText) + 1;
                    window.update(window.gameRef, { "pScore": pScore });
                    playSound('playerScore');
                    resetBall(-1);
                } else if (ballY > boxRect.height) {
                    let cScore = parseInt(cScoreDisplay.innerText) + 1;
                    window.update(window.gameRef, { "cScore": cScore });
                    playSound('cpuScore');
                    resetBall(1);
                }

                window.update(window.gameRef, { "ballX": ballX, "ballY": ballY });
                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            }

            requestAnimationFrame(updateGame);
        }
    </script>
</body>
</html>
