<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سايلنت بونج - فيزياء سلسة</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #06070d;
            overflow: hidden;
        }

        body {
            color: #fff;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(15px + env(safe-area-inset-bottom)) 10px;
            touch-action: none; 
        }

        .game-container {
            width: 100%;
            max-width: 360px;
            flex: 1; 
            margin-bottom: 10px;
            background: radial-gradient(circle, #111322 0%, #06070d 100%);
            border: 3px solid #00d2ff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        .control-slider-container {
            width: 100%;
            max-width: 360px;
            background: #111322;
            border: 2px solid #00d2ff;
            border-radius: 15px;
            height: 55px;
            min-height: 55px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
        }

        .control-track {
            width: 88%;
            height: 6px;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 3px;
            position: relative;
        }

        .control-knob {
            width: 50px;
            height: 28px;
            background: #00d2ff;
            border-radius: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 25px #00d2ff, 0 0 5px #fff;
            cursor: pointer;
        }

        .net {
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent 30%, rgba(0, 210, 255, 0.15) 30%);
            background-size: 15px 10px;
            transform: translateY(-50%);
        }

        .paddle {
            position: absolute;
            width: 85px;
            height: 16px; 
            border-radius: 30px;
        }

        .paddle-top { top: 25px; }
        .paddle-bottom { bottom: 25px; }

        #playerPaddle {
            box-shadow: 0 0 20px #ff3344;
            background: #ff3344;
        }
        #cpuPaddle {
            box-shadow: 0 0 20px #33ff66;
            background: #33ff66;
        }

        #ball {
            position: absolute;
            width: 20px; 
            height: 20px;
            background: #fffb00;
            border-radius: 50%;
            box-shadow: 0 0 25px #fffb00, 0 0 10px #fff;
            display: none;
        }

        .score-display {
            position: absolute;
            font-size: 5rem;
            font-weight: 900;
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }

        #pScore {
            bottom: 70px; right: 25px;
            color: #ff3344; text-shadow: 0 0 20px #ff3344;
        }
        #cScore {
            top: 70px; left: 25px;
            color: #33ff66; text-shadow: 0 0 20px #33ff66;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 7, 13, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 25px;
        }

        .overlay h2 {
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin-bottom: 25px;
            font-size: 1.4rem;
        }

        .overlay input {
            padding: 12px;
            font-size: 1.5rem;
            width: 110px;
            text-align: center;
            border: 2px solid #00d2ff;
            background: #111322;
            color: #fff;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .status-msg {
            font-size: 1rem;
            color: #8892b0;
            margin-bottom: 25px;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .overlay button {
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            width: 100%;
            max-width: 220px;
        }

        #startBtn {
            background: linear-gradient(135deg, #ff3344, #ff6600);
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.4);
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameBox">
        <div id="cScore" class="score-display">0</div>
        <div id="pScore" class="score-display">0</div>
        <div class="net"></div>
        <div id="cpuPaddle" class="paddle paddle-top"></div>
        <div id="playerPaddle" class="paddle paddle-bottom"></div>
        <div id="ball"></div>

        <div id="startOverlay" class="overlay">
            <h2>⚡ سايلنت بونج ⚡</h2>
            <div class="status-msg" id="statusMessage">انتظر الاتصال ...</div>
            <input type="number" id="playerRoleInput" pattern="[1-2]*" inputmode="numeric" min="1" max="2" placeholder="رقم 1 أو 2">
            <div class="btn-group">
                <button id="joinBtn" onclick="window.joinGame()">🚀 دخول الساحة</button>
                <button id="startBtn" onclick="window.requestStartGame()" style="display: none;">🔥 بدء المواجهة</button>
            </div>
        </div>
    </div>

    <div class="control-slider-container" id="sliderContainer">
        <div class="control-track">
            <div class="control-knob" id="sliderKnob"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5-fI6x_c5O5eyx5aqLpDRa15xSKDzrr4",
            authDomain: "moor-ff93d.firebaseapp.com",
            projectId: "moor-ff93d",
            storageBucket: "moor-ff93d.firebasestorage.app",
            messagingSenderId: "482827206696",
            appId: "1:482827206696:web:20651d267da19c0234f51d",
            measurementId: "G-781HE6SX64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, "gameRoom");

        window.fbUpdate = update;
        window.fbSet = set;
        window.gameRef = gameRef;

        let lastPScore = 0, lastCScore = 0;

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            window.onlineData = data;
            const statusMessage = document.getElementById("statusMessage");
            const roleInput = document.getElementById("playerRoleInput");
            const joinBtn = document.getElementById("joinBtn");
            const startBtn = document.getElementById("startBtn");

            if (!window.hasJoined) {
                if (!data || (!data.p1_online && !data.p2_online)) statusMessage.innerText = "أدخل رقم 1 للتحكم بالأسفل (أحمر).";
                else if (data.p1_online && !data.p2_online) statusMessage.innerHTML = "اللاعب الأول متصل (أحمر)<br>أدخل رقم 2 للعب بالأخضر.";
                else if (data.p1_online && data.p2_online) statusMessage.innerText = "اللاعبان متصلان! اضغط 'بدء المواجهة'.";
            } else {
                if (data && data.p1_online && data.p2_online && !data.gameStarted) {
                    statusMessage.innerHTML = "✅ اكتمل الاتصال! اضغط زر الانطلاق.";
                    roleInput.style.display = "none";
                    joinBtn.style.display = "none";
                    startBtn.style.display = "block";
                }
                if (data) {
                    if (data.pScore !== undefined && data.pScore !== lastPScore) {
                        document.getElementById('pScore').innerText = data.pScore;
                        lastPScore = data.pScore;
                    }
                    if (data.cScore !== undefined && data.cScore !== lastCScore) {
                        document.getElementById('cScore').innerText = data.cScore;
                        lastCScore = data.cScore;
                    }
                    if (window.myRole === 1) {
                        if (data.playerX !== undefined) window.updateLocalPaddle(data.playerX, 'player');
                        if (data.cpuX !== undefined) window.updateLocalPaddle(data.cpuX, 'cpu');
                        if (data.ballX !== undefined && data.ballY !== undefined) window.updateBallPosition(data.ballX, data.ballY);
                    } else if (window.myRole === 2) {
                        if (data.cpuX !== undefined) window.updateLocalPaddle(data.cpuX, 'player');
                        if (data.playerX !== undefined) window.updateLocalPaddle(data.playerX, 'cpu');
                        if (data.ballX !== undefined && data.ballY !== undefined && window.boxRectW) {
                            let invX = window.boxRectW - 20 - data.ballX;
                            let invY = window.boxRectH - 20 - data.ballY;
                            window.updateBallPosition(invX, invY);
                        }
                    }
                    if (data.gameStarted === true && !window.gameRunning) window.triggerActualStart();
                }
            }
        });
    </script>

    <script>
        // ------------------- DOM Elements -------------------
        const gameBox = document.getElementById('gameBox');
        const playerPaddleElem = document.getElementById('playerPaddle');
        const cpuPaddleElem = document.getElementById('cpuPaddle');
        const ball = document.getElementById('ball');
        const startOverlay = document.getElementById('startOverlay');
        const sliderContainer = document.getElementById('sliderContainer');
        const sliderKnob = document.getElementById('sliderKnob');

        window.myRole = 0;
        window.hasJoined = false;
        window.gameRunning = false;

        let boxRect = gameBox.getBoundingClientRect();
        window.boxRectW = boxRect.width;
        window.boxRectH = boxRect.height;
        const paddleWidth = 85;
        const paddleHeight = 16;
        const ballSize = 20;
        const PADDLE_Y_TOP = 25;
        const PADDLE_Y_BOTTOM = (boxRect.height - 25 - paddleHeight);
        const BALL_RADIUS = 10; // نصف القطر للكشف الدقيق

        let myPaddleX = (boxRect.width / 2) - (paddleWidth / 2);
        let ballX = (boxRect.width / 2) - (ballSize / 2);
        let ballY = (boxRect.height / 2) - (ballSize / 2);
        let ballSpeedX = 0, ballSpeedY = 0;
        const initialSpeedY = 5.5;

        function resizeGame() {
            boxRect = gameBox.getBoundingClientRect();
            window.boxRectW = boxRect.width;
            window.boxRectH = boxRect.height;
            if (!window.gameRunning) return;
            let maxX = boxRect.width - paddleWidth;
            if (myPaddleX > maxX) myPaddleX = maxX;
            if (myPaddleX < 0) myPaddleX = 0;
            playerPaddleElem.style.left = myPaddleX + 'px';
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => setTimeout(resizeGame, 150));

        window.updateLocalPaddle = (x, type) => {
            if (type === 'player') playerPaddleElem.style.left = x + 'px';
            else if (type === 'cpu') cpuPaddleElem.style.left = x + 'px';
        };
        window.updateBallPosition = (x, y) => { ball.style.left = x + 'px'; ball.style.top = y + 'px'; };

        window.joinGame = function() {
            const roleInput = document.getElementById("playerRoleInput").value;
            if (roleInput !== "1" && roleInput !== "2") { alert("❌ يرجى كتابة 1 أو 2 فقط!"); return; }
            window.myRole = parseInt(roleInput);
            window.hasJoined = true;
            resizeGame();

            if (window.myRole === 2) {
                playerPaddleElem.style.background = "#33ff66"; playerPaddleElem.style.boxShadow = "0 0 20px #33ff66";
                cpuPaddleElem.style.background = "#ff3344"; cpuPaddleElem.style.boxShadow = "0 0 20px #ff3344";
                sliderKnob.style.background = "#33ff66"; sliderKnob.style.boxShadow = "0 0 25px #33ff66, 0 0 5px #fff";
                sliderContainer.style.borderColor = "#33ff66";
                const p = document.getElementById('pScore'), c = document.getElementById('cScore');
                p.style.color = "#33ff66"; p.style.textShadow = "0 0 20px #33ff66"; p.style.bottom = "auto"; p.style.top = "70px"; p.style.left = "25px"; p.style.right = "auto";
                c.style.color = "#ff3344"; c.style.textShadow = "0 0 20px #ff3344"; c.style.top = "auto"; c.style.bottom = "70px"; c.style.right = "25px"; c.style.left = "auto";
            } else {
                playerPaddleElem.style.background = "#ff3344"; playerPaddleElem.style.boxShadow = "0 0 20px #ff3344";
                cpuPaddleElem.style.background = "#33ff66"; cpuPaddleElem.style.boxShadow = "0 0 20px #33ff66";
                sliderKnob.style.background = "#00d2ff"; sliderKnob.style.boxShadow = "0 0 25px #00d2ff, 0 0 5px #fff";
                sliderContainer.style.borderColor = "#00d2ff";
                const p = document.getElementById('pScore'), c = document.getElementById('cScore');
                p.style.color = "#ff3344"; p.style.bottom = "70px"; p.style.right = "25px"; p.style.top = "auto"; p.style.left = "auto";
                c.style.color = "#33ff66"; c.style.top = "70px"; c.style.left = "25px"; c.style.bottom = "auto";
            }
            if (window.myRole === 1) {
                window.fbSet(window.gameRef, { p1_online: true, p2_online: false, pScore: 0, cScore: 0, gameStarted: false, playerX: myPaddleX, cpuX: myPaddleX, ballX: (boxRect.width/2)-10, ballY: (boxRect.height/2)-10 });
            } else { window.fbUpdate(window.gameRef, { p2_online: true, cpuX: myPaddleX }); }
        };

        window.requestStartGame = function() {
            if (!window.onlineData?.p1_online || !window.onlineData?.p2_online) { alert("اللاعب الآخر ليس جاهزاً!"); return; }
            window.fbUpdate(window.gameRef, { gameStarted: true });
        };

        window.triggerActualStart = function() {
            startOverlay.style.display = 'none';
            ball.style.display = 'block';
            window.gameRunning = true;
            resizeGame();
            if (window.myRole === 1) { resetBall(1); window.fbUpdate(window.gameRef, { ballX, ballY }); }
            requestAnimationFrame(updateGame);
        };

        function handleSliderMove(clientX) {
            if (!window.gameRunning) return;
            const box = gameBox.getBoundingClientRect();
            const sliderRect = sliderContainer.getBoundingClientRect();
            let percent = (clientX - sliderRect.left) / sliderRect.width;
            percent = Math.min(1, Math.max(0, percent));
            sliderKnob.style.left = `calc(${percent * 100}% - 25px)`;
            let newX = percent * (box.width - paddleWidth);
            myPaddleX = Math.min(box.width - paddleWidth, Math.max(0, newX));
            playerPaddleElem.style.left = myPaddleX + 'px';
            if (window.myRole === 1) window.fbUpdate(window.gameRef, { playerX: myPaddleX });
            else window.fbUpdate(window.gameRef, { cpuX: myPaddleX });
        }

        sliderContainer.addEventListener('touchstart', (e) => { e.preventDefault(); handleSliderMove(e.touches[0].clientX); }, { passive: false });
        sliderContainer.addEventListener('touchmove', (e) => { e.preventDefault(); handleSliderMove(e.touches[0].clientX); }, { passive: false });
        sliderContainer.addEventListener('mousedown', (e) => {
            handleSliderMove(e.clientX);
            const onMove = (ev) => handleSliderMove(ev.clientX);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', () => window.removeEventListener('mousemove', onMove), { once: true });
        });

        function resetBall(direction) {
            boxRect = gameBox.getBoundingClientRect();
            ballX = (boxRect.width / 2) - BALL_RADIUS;
            ballY = (boxRect.height / 2) - BALL_RADIUS;
            ballSpeedX = (Math.random() - 0.5) * 4.5;
            ballSpeedY = direction * initialSpeedY;
            if (Math.abs(ballSpeedX) < 1.2) ballSpeedX = ballSpeedX > 0 ? 1.8 : -1.8;
        }

        // فيزياء دقيقة: منع التخلل والارتداد الطبيعي
        function handleCollision() {
            // الجدران الجانبية (يمين/يسار)
            if (ballX <= 0) { ballX = 0; ballSpeedX = -ballSpeedX; }
            if (ballX >= boxRect.width - ballSize) { ballX = boxRect.width - ballSize; ballSpeedX = -ballSpeedX; }

            // مضرب اللاعب السفلي (نفسه)
            const playerPaddleRect = { x: myPaddleX, y: boxRect.height - 25 - paddleHeight, w: paddleWidth, h: paddleHeight };
            const ballRect = { x: ballX, y: ballY, w: ballSize, h: ballSize };
            if (ballRect.x < playerPaddleRect.x + playerPaddleRect.w && ballRect.x + ballRect.w > playerPaddleRect.x &&
                ballRect.y < playerPaddleRect.y + playerPaddleRect.h && ballRect.y + ballRect.h > playerPaddleRect.y) {
                // ارتطام دقيق
                let hitPos = (ballX + BALL_RADIUS) - (playerPaddleRect.x + paddleWidth/2);
                let angle = hitPos * 0.28;
                ballSpeedX = Math.min(6, Math.max(-6, angle));
                ballSpeedY = -Math.abs(ballSpeedY);
                // إزاحة الكرة لخارج المضرب لمنع التشبث
                ballY = playerPaddleRect.y - ballSize;
            }

            // مضرب الخصم العلوي (يتم جلبه من البيانات)
            let cpuX = (window.myRole === 1) ? (window.onlineData?.cpuX ?? (boxRect.width/2 - paddleWidth/2)) : (window.onlineData?.playerX ?? (boxRect.width/2 - paddleWidth/2));
            const cpuPaddleRect = { x: cpuX, y: 25, w: paddleWidth, h: paddleHeight };
            if (ballRect.x < cpuPaddleRect.x + cpuPaddleRect.w && ballRect.x + ballRect.w > cpuPaddleRect.x &&
                ballRect.y < cpuPaddleRect.y + cpuPaddleRect.h && ballRect.y + ballRect.h > cpuPaddleRect.y) {
                let hitPos = (ballX + BALL_RADIUS) - (cpuPaddleRect.x + paddleWidth/2);
                let angle = hitPos * 0.28;
                ballSpeedX = Math.min(6, Math.max(-6, angle));
                ballSpeedY = Math.abs(ballSpeedY);
                ballY = cpuPaddleRect.y + paddleHeight;
            }
        }

        function updateGame() {
            if (!window.gameRunning) return;
            if (window.myRole === 1) {
                ballX += ballSpeedX;
                ballY += ballSpeedY;
                handleCollision();

                // تسجيل الأهداف (فقط عندما تخرج الكرة تماماً من الحقل)
                if (ballY + ballSize < 0) {
                    let newScore = parseInt(document.getElementById('pScore').innerText) + 1;
                    window.fbUpdate(window.gameRef, { pScore: newScore });
                    resetBall(1);
                    window.fbUpdate(window.gameRef, { ballX, ballY });
                } else if (ballY > boxRect.height) {
                    let newScore = parseInt(document.getElementById('cScore').innerText) + 1;
                    window.fbUpdate(window.gameRef, { cScore: newScore });
                    resetBall(-1);
                    window.fbUpdate(window.gameRef, { ballX, ballY });
                }

                window.fbUpdate(window.gameRef, { ballX, ballY });
                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            } else if (window.myRole === 2) {
                const data = window.onlineData;
                if (data && data.ballX !== undefined && boxRect.width) {
                    let invX = boxRect.width - ballSize - data.ballX;
                    let invY = boxRect.height - ballSize - data.ballY;
                    ball.style.left = invX + 'px';
                    ball.style.top = invY + 'px';
                }
                if (data?.playerX !== undefined) cpuPaddleElem.style.left = data.playerX + 'px';
                if (data?.cpuX !== undefined) { playerPaddleElem.style.left = data.cpuX + 'px'; myPaddleX = data.cpuX; }
                document.getElementById('pScore').innerText = data?.pScore ?? 0;
                document.getElementById('cScore').innerText = data?.cScore ?? 0;
            }
            requestAnimationFrame(updateGame);
        }

        window.addEventListener('load', () => { resizeGame(); setTimeout(resizeGame, 100); });
    </script>
</body>
</html>
