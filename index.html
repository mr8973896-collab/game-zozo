<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سايلنت بونج - هدوء تام</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #06070d;
            overflow: hidden;
        }

        body {
            color: #fff;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(15px + env(safe-area-inset-bottom)) 10px;
            touch-action: none; 
        }

        .game-container {
            width: 100%;
            max-width: 360px;
            flex: 1; 
            margin-bottom: 10px;
            background: radial-gradient(circle, #111322 0%, #06070d 100%);
            border: 3px solid #00d2ff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
            position: relative;
            overflow: hidden;
            touch-action: none;
            transition: none;
        }

        .control-slider-container {
            width: 100%;
            max-width: 360px;
            background: #111322;
            border: 2px solid #00d2ff;
            border-radius: 15px;
            height: 55px;
            min-height: 55px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
        }

        .control-track {
            width: 88%;
            height: 6px;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 3px;
            position: relative;
        }

        .control-knob {
            width: 50px;
            height: 28px;
            background: #00d2ff;
            border-radius: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 25px #00d2ff, 0 0 5px #fff;
            cursor: pointer;
        }

        .net {
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent 30%, rgba(0, 210, 255, 0.15) 30%);
            background-size: 15px 10px;
            transform: translateY(-50%);
        }

        .paddle {
            position: absolute;
            width: 85px;
            height: 16px; 
            border-radius: 30px;
            transition: none; 
        }

        /* المضرب العلوي (الخصم) بشكل عام */
        .paddle-top {
            top: 25px;
        }
        /* المضرب السفلي (اللاعب) بشكل عام */
        .paddle-bottom {
            bottom: 25px;
        }

        #playerPaddle {
            box-shadow: 0 0 20px #ff3344;
            background: #ff3344;
        }
        #cpuPaddle {
            box-shadow: 0 0 20px #33ff66;
            background: #33ff66;
        }

        #ball {
            position: absolute;
            width: 20px; 
            height: 20px;
            background: #fffb00;
            border-radius: 50%;
            box-shadow: 0 0 25px #fffb00, 0 0 10px #fff;
            left: calc(50% - 10px);
            top: calc(50% - 10px);
            will-change: top, left;
            display: none; 
        }

        .score-display {
            position: absolute;
            font-size: 5rem;
            font-weight: 900;
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }

        /* مواقع افتراضية للاعب 1 */
        #pScore {
            bottom: 70px; right: 25px;
            color: #ff3344; text-shadow: 0 0 20px #ff3344;
        }
        #cScore {
            top: 70px; left: 25px;
            color: #33ff66; text-shadow: 0 0 20px #33ff66;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 7, 13, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 25px;
        }

        .overlay h2 {
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin-bottom: 25px;
            font-size: 1.4rem;
        }

        .overlay input {
            padding: 12px;
            font-size: 1.5rem;
            width: 110px;
            text-align: center;
            border: 2px solid #00d2ff;
            background: #111322;
            color: #fff;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .status-msg {
            font-size: 1rem;
            color: #8892b0;
            margin-bottom: 25px;
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .overlay button {
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            width: 100%;
            max-width: 220px;
        }

        #startBtn {
            background: linear-gradient(135deg, #ff3344, #ff6600);
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.4);
        }

        /* تم إزالة كل تأثيرات الاهتزاز والحركة */
    </style>
</head>
<body>

    <div class="game-container" id="gameBox">
        <div id="cScore" class="score-display">0</div>
        <div id="pScore" class="score-display">0</div>
        
        <div class="net"></div>
        <div id="cpuPaddle" class="paddle paddle-top"></div>
        <div id="playerPaddle" class="paddle paddle-bottom"></div>
        <div id="ball"></div>

        <div id="startOverlay" class="overlay">
            <h2>⚡ سايلنت بونج ⚡</h2>
            <div class="status-msg" id="statusMessage">انتظر الاتصال ...</div>
            
            <input type="number" id="playerRoleInput" pattern="[1-2]*" inputmode="numeric" min="1" max="2" placeholder="رقم 1 أو 2">
            
            <div class="btn-group">
                <button id="joinBtn" onclick="window.joinGame()">🚀 دخول الساحة</button>
                <button id="startBtn" onclick="window.requestStartGame()" style="display: none;">🔥 بدء المواجهة</button>
            </div>
        </div>
    </div>

    <div class="control-slider-container" id="sliderContainer">
        <div class="control-track">
            <div class="control-knob" id="sliderKnob"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5-fI6x_c5O5eyx5aqLpDRa15xSKDzrr4",
            authDomain: "moor-ff93d.firebaseapp.com",
            projectId: "moor-ff93d",
            storageBucket: "moor-ff93d.firebasestorage.app",
            messagingSenderId: "482827206696",
            appId: "1:482827206696:web:20651d267da19c0234f51d",
            measurementId: "G-781HE6SX64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, "gameRoom");

        window.fbUpdate = update;
        window.fbSet = set;
        window.gameRef = gameRef;

        let lastPScore = 0;
        let lastCScore = 0;

        // مراقبة البيانات من Firebase
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            window.onlineData = data; 

            const statusMessage = document.getElementById("statusMessage");
            const roleInput = document.getElementById("playerRoleInput");
            const joinBtn = document.getElementById("joinBtn");
            const startBtn = document.getElementById("startBtn");

            if (!window.hasJoined) {
                if (!data || (!data.p1_online && !data.p2_online)) {
                    statusMessage.innerText = "أدخل رقم 1 للتحكم بالأسفل (أحمر).";
                } else if (data.p1_online && !data.p2_online) {
                    statusMessage.innerHTML = "اللاعب الأول متصل (أحمر)<br>أدخل رقم 2 للعب بالأخضر.";
                } else if (data.p1_online && data.p2_online) {
                    statusMessage.innerText = "اللاعبان متصلان! اضغط 'بدء المواجهة'.";
                }
            } else {
                if (data && data.p1_online && data.p2_online && !data.gameStarted) {
                    statusMessage.innerHTML = "✅ اكتمل الاتصال! اضغط زر الانطلاق.";
                    roleInput.style.display = "none";
                    joinBtn.style.display = "none";
                    startBtn.style.display = "block";
                }

                if (data) {
                    // تحديث الأرقام فقط
                    if (data.pScore !== undefined && data.pScore !== lastPScore) {
                        document.getElementById('pScore').innerText = data.pScore;
                        lastPScore = data.pScore;
                    }
                    if (data.cScore !== undefined && data.cScore !== lastCScore) {
                        document.getElementById('cScore').innerText = data.cScore;
                        lastCScore = data.cScore;
                    }

                    // تحديث مواضع المضارب بناءً على الدور الحقيقي
                    if (window.myRole === 1) {
                        // اللاعب 1: مضربه الخاص هو playerPaddle (أسفل)، مضرب الخصم هو cpuPaddle (أعلى)
                        if (data.playerX !== undefined) window.updateLocalPaddle(data.playerX, 'player');
                        if (data.cpuX !== undefined) window.updateLocalPaddle(data.cpuX, 'cpu');
                        if (data.ballX !== undefined && data.ballY !== undefined) window.updateBallPosition(data.ballX, data.ballY);
                    } else if (window.myRole === 2) {
                        // اللاعب 2: مضربه الخاص هو playerPaddle (أسفل)، ولكن بالنسبة له، الخصم هو اللاعب 1
                        // في بيانات الفايربيز، cpuX تمثل موقع اللاعب 2 الفعلي، و playerX موقع اللاعب 1 الفعلي.
                        // نعكس المنطق: مضرب اللاعب 2 الخاص به = بيانات cpuX (لأنه هو الذي يتحكم به)، ومضرب الخصم = بيانات playerX
                        if (data.cpuX !== undefined) window.updateLocalPaddle(data.cpuX, 'player');
                        if (data.playerX !== undefined) window.updateLocalPaddle(data.playerX, 'cpu');
                        if (data.ballX !== undefined && data.ballY !== undefined && window.boxRectW) {
                            // عكس إحداثيات الكرة للاعب 2
                            let invertedX = window.boxRectW - 20 - data.ballX;
                            let invertedY = window.boxRectH - 20 - data.ballY;
                            window.updateBallPosition(invertedX, invertedY);
                        }
                    }

                    if (data.gameStarted === true && !window.gameRunning) {
                        window.triggerActualStart();
                    }
                }
            }
        });
    </script>

    <script>
        // ------------------- عناصر DOM -------------------
        const gameBox = document.getElementById('gameBox');
        const playerPaddleElem = document.getElementById('playerPaddle');
        const cpuPaddleElem = document.getElementById('cpuPaddle');
        const ball = document.getElementById('ball');
        const startOverlay = document.getElementById('startOverlay');
        const sliderContainer = document.getElementById('sliderContainer');
        const sliderKnob = document.getElementById('sliderKnob');

        window.myRole = 0;
        window.hasJoined = false;
        window.gameRunning = false;

        let boxRect = gameBox.getBoundingClientRect();
        window.boxRectW = boxRect.width;
        window.boxRectH = boxRect.height;
        let paddleWidth = 85;
        let paddleHeight = 16;
        let ballSize = 20; 

        let myPaddleX = (boxRect.width / 2) - (paddleWidth / 2);
        let ballX = (boxRect.width / 2) - (ballSize / 2);
        let ballY = (boxRect.height / 2) - (ballSize / 2);

        let ballSpeedX = 0;
        let ballSpeedY = 0;
        const initialSpeedY = 6.2; 

        function resizeGame() {
            boxRect = gameBox.getBoundingClientRect();
            window.boxRectW = boxRect.width;
            window.boxRectH = boxRect.height;
            if (!window.gameRunning) return;
            if (window.myRole === 1 && window.gameRunning) {
                let maxX = boxRect.width - paddleWidth;
                if (myPaddleX > maxX) myPaddleX = maxX;
                if (myPaddleX < 0) myPaddleX = 0;
                playerPaddleElem.style.left = myPaddleX + 'px';
            } else if (window.myRole === 2 && window.gameRunning) {
                // للاعب 2 نعيد ضبط موضع المضرب الخاص به بناءً على myPaddleX الحالي
                let maxX = boxRect.width - paddleWidth;
                if (myPaddleX > maxX) myPaddleX = maxX;
                if (myPaddleX < 0) myPaddleX = 0;
                playerPaddleElem.style.left = myPaddleX + 'px';
            }
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => { setTimeout(resizeGame, 150); });

        // دالة لتحديث المضارب محلياً (بدون عكس منطق المعادلات هنا، كل شيء يتم عبر الـ role)
        window.updateLocalPaddle = function(x, type) {
            if (type === 'player') {
                playerPaddleElem.style.left = x + 'px';
            } else if (type === 'cpu') {
                cpuPaddleElem.style.left = x + 'px';
            }
        };

        window.updateBallPosition = function(x, y) {
            if (!ball) return;
            ballX = x; ballY = y;
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        };

        window.joinGame = function() {
            const roleInput = document.getElementById("playerRoleInput").value;
            if (roleInput !== "1" && roleInput !== "2") {
                alert("❌ يرجى كتابة 1 أو 2 فقط لتحديد دورك!");
                return;
            }
            window.myRole = parseInt(roleInput);
            window.hasJoined = true;
            resizeGame();

            // تخصيص الألوان والواجهة حسب الدور
            if (window.myRole === 2) {
                // اللاعب 2: مضربه الخاص أخضر، والخصم أحمر
                playerPaddleElem.style.background = "#33ff66";
                playerPaddleElem.style.boxShadow = "0 0 20px #33ff66";
                cpuPaddleElem.style.background = "#ff3344";
                cpuPaddleElem.style.boxShadow = "0 0 20px #ff3344";
                
                sliderKnob.style.background = "#33ff66";
                sliderKnob.style.boxShadow = "0 0 25px #33ff66, 0 0 5px #fff";
                sliderContainer.style.borderColor = "#33ff66";
                sliderContainer.style.boxShadow = "0 0 20px rgba(51, 255, 102, 0.25)";
                
                // تعديل مواقع النقاط للاعب 2
                const pScoreDiv = document.getElementById('pScore');
                const cScoreDiv = document.getElementById('cScore');
                pScoreDiv.style.color = "#33ff66"; // نتيجته هو (اللاعب 2) باللون الأخضر
                pScoreDiv.style.textShadow = "0 0 20px #33ff66";
                pScoreDiv.style.bottom = "auto"; pScoreDiv.style.top = "70px"; pScoreDiv.style.left = "25px";
                pScoreDiv.style.right = "auto";
                
                cScoreDiv.style.color = "#ff3344"; // نتيجة الخصم باللون الأحمر
                cScoreDiv.style.textShadow = "0 0 20px #ff3344";
                cScoreDiv.style.top = "auto"; cScoreDiv.style.bottom = "70px"; cScoreDiv.style.right = "25px";
                cScoreDiv.style.left = "auto";
            } else {
                // اللاعب 1: مضربه الخاص أحمر، والخصم أخضر
                playerPaddleElem.style.background = "#ff3344";
                playerPaddleElem.style.boxShadow = "0 0 20px #ff3344";
                cpuPaddleElem.style.background = "#33ff66";
                cpuPaddleElem.style.boxShadow = "0 0 20px #33ff66";
                sliderKnob.style.background = "#00d2ff";
                sliderKnob.style.boxShadow = "0 0 25px #00d2ff, 0 0 5px #fff";
                sliderContainer.style.borderColor = "#00d2ff";
                const pScoreDiv = document.getElementById('pScore');
                const cScoreDiv = document.getElementById('cScore');
                pScoreDiv.style.color = "#ff3344";
                pScoreDiv.style.bottom = "70px"; pScoreDiv.style.right = "25px";
                pScoreDiv.style.top = "auto"; pScoreDiv.style.left = "auto";
                cScoreDiv.style.color = "#33ff66";
                cScoreDiv.style.top = "70px"; cScoreDiv.style.left = "25px";
                cScoreDiv.style.bottom = "auto";
            }

            if (window.myRole === 1) {
                window.fbSet(window.gameRef, {
                    p1_online: true,
                    p2_online: false,
                    pScore: 0,
                    cScore: 0,
                    gameStarted: false,
                    playerX: myPaddleX,  // موقع المضرب السفلي للاعب 1
                    cpuX: myPaddleX,     // موقع المضرب العلوي (اللاعب 2)
                    ballX: (boxRect.width/2)-10,
                    ballY: (boxRect.height/2)-10
                });
            } else if (window.myRole === 2) {
                // عند انضمام اللاعب 2، يتم تحديث cpuX (الذي يمثل مضرب اللاعب 2 بالنسبة لقاعدة البيانات)
                window.fbUpdate(window.gameRef, { 
                    p2_online: true,
                    cpuX: myPaddleX 
                });
            }
        };

        window.requestStartGame = function() {
            const data = window.onlineData;
            if (!data || !data.p1_online || !data.p2_online) {
                alert("اللاعب الآخر ليس جاهزاً بعد!");
                return;
            }
            window.fbUpdate(window.gameRef, { "gameStarted": true });
        };

        window.triggerActualStart = function() {
            startOverlay.style.display = 'none';
            ball.style.display = 'block';
            window.gameRunning = true;
            resizeGame();

            if (window.myRole === 1) {
                resetBall(1);
                window.fbUpdate(window.gameRef, { ballX: ballX, ballY: ballY });
            }
            requestAnimationFrame(updateGame);
        };

        // التحكم بالسلايدر - طبيعي 100% بدون أي عكس
        function handleSliderMove(clientX) {
            if (!window.gameRunning) return;
            const boxRectNow = gameBox.getBoundingClientRect();
            const sliderRect = sliderContainer.getBoundingClientRect();
            
            let relativeX = clientX - sliderRect.left;
            let percentage = relativeX / sliderRect.width;
            percentage = Math.max(0, Math.min(1, percentage));

            sliderKnob.style.left = `calc(${percentage * 100}% - 25px)`;

            let currentX = percentage * (boxRectNow.width - paddleWidth);
            myPaddleX = currentX;
            // تحديث المضرب الخاص باللاعب محلياً
            playerPaddleElem.style.left = myPaddleX + 'px';

            let dataToSend = {};
            if (window.myRole === 1) {
                // اللاعب 1 يتحكم بـ playerX (المضرب السفلي)
                dataToSend["playerX"] = myPaddleX;
            } else if (window.myRole === 2) {
                // اللاعب 2 يتحكم بـ cpuX (المضرب السفلي في عالمه، لكن في قاعدة البيانات يمثل المضرب العلوي للاعب 1)
                dataToSend["cpuX"] = myPaddleX;
            }
            window.fbUpdate(window.gameRef, dataToSend);
        }

        sliderContainer.addEventListener('touchstart', (e) => { 
            e.preventDefault();
            handleSliderMove(e.touches[0].clientX); 
        }, { passive: false });
        sliderContainer.addEventListener('touchmove', (e) => { 
            e.preventDefault();
            handleSliderMove(e.touches[0].clientX); 
        }, { passive: false });
        sliderContainer.addEventListener('mousedown', (e) => {
            handleSliderMove(e.clientX);
            function onMouseMove(event) { handleSliderMove(event.clientX); }
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', () => { window.removeEventListener('mousemove', onMouseMove); }, { once: true });
        });

        function resetBall(direction) {
            boxRect = gameBox.getBoundingClientRect();
            ballX = (boxRect.width / 2) - (ballSize / 2);
            ballY = (boxRect.height / 2) - (ballSize / 2);
            ballSpeedX = (Math.random() - 0.5) * 4.8;
            ballSpeedY = direction * initialSpeedY;
            if (Math.abs(ballSpeedX) < 1.2) ballSpeedX = ballSpeedX > 0 ? 1.5 : -1.5;
        }

        function updateGame() {
            if (!window.gameRunning) return;

            if (window.myRole === 1) {
                let data = window.onlineData;
                // جلب موقع مضرب الخصم (اللاعب 2) من قاعدة البيانات
                let currentCpuX = (data && data.cpuX !== undefined) ? data.cpuX : (boxRect.width / 2 - paddleWidth / 2);
                
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                // ارتطام الجدران الجانبية
                if (ballX <= 0) {
                    ballX = 0;
                    ballSpeedX = -ballSpeedX;
                }
                if (ballX >= boxRect.width - ballSize) {
                    ballX = boxRect.width - ballSize;
                    ballSpeedX = -ballSpeedX;
                }

                // ارتطام مضرب الخصم العلوي (اللاعب 2)
                if (ballY <= 25 + paddleHeight && ballY >= 23) {
                    if (ballX + ballSize >= currentCpuX && ballX <= currentCpuX + paddleWidth) {
                        ballY = 25 + paddleHeight;
                        ballSpeedY = -ballSpeedY;
                        let hitPoint = (ballX + ballSize/2) - (currentCpuX + paddleWidth/2);
                        let maxAngle = 6;
                        ballSpeedX = Math.min(maxAngle, Math.max(-maxAngle, hitPoint * 0.28));
                    }
                }

                // ارتطام مضرب اللاعب السفلي (نفسه)
                if (ballY >= boxRect.height - 25 - paddleHeight - ballSize && ballY <= boxRect.height - 25) {
                    if (ballX + ballSize >= myPaddleX && ballX <= myPaddleX + paddleWidth) {
                        ballY = boxRect.height - 25 - paddleHeight - ballSize;
                        ballSpeedY = -ballSpeedY;
                        let hitPoint = (ballX + ballSize/2) - (myPaddleX + paddleWidth/2);
                        let maxAngle = 6;
                        ballSpeedX = Math.min(maxAngle, Math.max(-maxAngle, hitPoint * 0.28));
                    }
                }

                // تسجيل الأهداف: بدون أي تأثيرات
                if (ballY < 0) {
                    let currentP = parseInt(document.getElementById('pScore').innerText) + 1;
                    window.fbUpdate(window.gameRef, { "pScore": currentP });
                    resetBall(-1);
                    window.fbUpdate(window.gameRef, { ballX: ballX, ballY: ballY });
                } 
                else if (ballY > boxRect.height) {
                    let currentC = parseInt(document.getElementById('cScore').innerText) + 1;
                    window.fbUpdate(window.gameRef, { "cScore": currentC });
                    resetBall(1);
                    window.fbUpdate(window.gameRef, { ballX: ballX, ballY: ballY });
                }

                window.fbUpdate(window.gameRef, { "ballX": ballX, "ballY": ballY });
                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            } 
            else if (window.myRole === 2) {
                // اللاعب 2 فقط يقوم بتحديث واجهته بناءً على البيانات دون أي تحكم فيزيائي
                const data = window.onlineData;
                if (data && data.ballX !== undefined && data.ballY !== undefined && boxRect.width) {
                    let invX = boxRect.width - ballSize - data.ballX;
                    let invY = boxRect.height - ballSize - data.ballY;
                    ball.style.left = invX + 'px';
                    ball.style.top = invY + 'px';
                }
                if (data && data.playerX !== undefined) {
                    // مضرب الخصم (اللاعب 1) يظهر في الأعلى
                    cpuPaddleElem.style.left = data.playerX + 'px';
                }
                if (data && data.cpuX !== undefined) {
                    // مضرب اللاعب 2 نفسه موجود في الأسفل
                    playerPaddleElem.style.left = data.cpuX + 'px';
                    // مزامنة myPaddleX مع القيمة من Firebase للحفاظ على التناسق
                    myPaddleX = data.cpuX;
                }
                if (data) {
                    document.getElementById('pScore').innerText = data.pScore || 0;
                    document.getElementById('cScore').innerText = data.cScore || 0;
                }
            }
            
            requestAnimationFrame(updateGame);
        }
        
        window.addEventListener('load', () => {
            resizeGame();
            setTimeout(resizeGame, 100);
        });
    </script>
</body>
</html>
